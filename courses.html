<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cursos - Docente Inclusivo Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
  <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6" href="#">Docente Inclusivo</a>
  <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="navbar-nav w-100 d-flex flex-row justify-content-end px-3">
    <div class="nav-item text-nowrap">
      <button class="nav-link px-3 bg-transparent border-0" id="logout-btn">Cerrar Sesión</button>
    </div>
  </div>
</header>

<div class="container-fluid">
  <div class="row">
    <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
      <div class="position-sticky pt-3 sidebar-sticky">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-house-door me-2" viewBox="0 0 16 16"><path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146zM2.5 14V7.707l5.5-5.5 5.5 5.5V14H10v-4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v4H2.5z"/></svg>
              Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="courses.html">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-book me-2" viewBox="0 0 16 16"><path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811V2.828zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492V2.687zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z"/></svg>
              Cursos y Módulos
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Gestión de Cursos</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
          <input type="file" id="importCourseInput" accept=".json" style="display: none;">
          <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="document.getElementById('importCourseInput').click()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-upload me-1" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/></svg>
            Importar Curso
          </button>
          <button type="button" class="btn btn-sm btn-primary" onclick="openCourseModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-lg me-1" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2Z"/></svg>
            Nuevo Curso
          </button>
        </div>
      </div>

      <div id="loadingIndicator" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
      </div>

      <!-- Accordion for courses -->
      <div class="accordion mb-5" id="coursesAccordion" style="display: none;">
        <!-- Dynamic content goes here -->
      </div>
    </main>
  </div>
</div>

<!-- Modal: Course -->
<div class="modal fade" id="courseModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="courseForm">
        <div class="modal-header">
          <h5 class="modal-title" id="courseModalTitle">Nuevo Curso</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="courseIdInput">
          <div class="mb-3">
            <label for="courseTitleInput" class="form-label">Título</label>
            <input type="text" class="form-control" id="courseTitleInput" required>
          </div>
          <div class="mb-3">
            <label for="courseDescInput" class="form-label">Descripción</label>
            <textarea class="form-control" id="courseDescInput" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label for="courseHoursInput" class="form-label">Horas Estimadas</label>
            <input type="number" class="form-control" id="courseHoursInput" value="0" min="0" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="courseSubmitBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal: Module -->
<div class="modal fade" id="moduleModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="moduleForm">
        <div class="modal-header">
          <h5 class="modal-title">Nuevo Módulo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="moduleCourseIdInput">
          <input type="hidden" id="moduleIdInput">
          <div class="mb-3">
            <label for="moduleTitleInput" class="form-label">Título del Módulo</label>
            <input type="text" class="form-control" id="moduleTitleInput" required>
          </div>
          <div class="mb-3">
            <label for="moduleOrderInput" class="form-label">Orden</label>
            <input type="number" class="form-control" id="moduleOrderInput" value="1" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="moduleSubmitBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal: Lesson -->
<div class="modal fade" id="lessonModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form id="lessonForm">
        <div class="modal-header">
          <h5 class="modal-title">Nueva Lección</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="lessonModuleIdInput">
          <input type="hidden" id="lessonIdInput">
          <div class="row">
            <div class="col-md-8 mb-3">
              <label for="lessonTitleInput" class="form-label">Título de la Lección</label>
              <input type="text" class="form-control" id="lessonTitleInput" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="lessonOrderInput" class="form-label">Orden</label>
              <input type="number" class="form-control" id="lessonOrderInput" value="1" required>
            </div>
          </div>
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label mb-0">URLs de Videos (Opcional)</label>
              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addVideoInput()">+ Añadir Video</button>
            </div>
            <div id="lessonVideosContainer"></div>
          </div>
          <div class="mb-3">
            <label for="lessonContentInput" class="form-label">Contenido (Markdown)</label>
            <textarea class="form-control font-monospace" id="lessonContentInput" rows="10"></textarea>
            <div class="form-text">Usa sintaxis Markdown para formatear el texto de la lección.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="lessonSubmitBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/turndown/dist/turndown.js"></script>
<script type="module" src="/courses.js"></script>
</body>
</html>
