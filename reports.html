<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Reportes - Docente Inclusivo Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow d-print-none">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6" href="#">Docente Inclusivo</a>
    <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse"
      data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="navbar-nav w-100 d-flex flex-row justify-content-end px-3">
        <div class="d-flex align-items-center">
          <span class="text-light me-3"><i class="bi bi-person-circle"></i> Admin</span>
          <button class="btn btn-outline-light btn-sm" id="logout-btn">Cerrar Sesión</button>
        </div>
    </div>
  </header>

  <div class="container-fluid">
    <div class="row">
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse d-print-none">
        <div class="position-sticky pt-3 sidebar-sticky">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                  class="bi bi-house-door me-2" viewBox="0 0 16 16">
                  <path
                    d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146zM2.5 14V7.707l5.5-5.5 5.5 5.5V14H10v-4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v4H2.5z" />
                </svg>
                Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="courses.html">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                  class="bi bi-book me-2" viewBox="0 0 16 16">
                  <path
                    d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811V2.828zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492V2.687zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z" />
                </svg>
                Cursos y Módulos
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="reports.html">
                <i class="bi bi-file-earmark-bar-graph me-2" style="font-size: 1.2rem;"></i>
                Reportes
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div
          class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom d-print-none">
          <h1 class="h2">Reportes de Avance</h1>
          <button class="btn btn-primary" onclick="window.print()">
            <i class="bi bi-printer me-1"></i> Imprimir / Exportar a PDF
          </button>
        </div>

        <div class="d-none d-print-block mb-4">
          <h2 class="text-center">Reporte de Avance Académico - Docente Inclusivo</h2>
          <p class="text-center text-muted" id="printDate"></p>
        </div>

        <div class="card shadow-sm mb-4 d-print-none">
          <div class="card-header bg-light fw-bold">
            <i class="bi bi-funnel me-2"></i> Filtros de Búsqueda
          </div>
          <div class="card-body">
            <form id="filterForm" class="row g-3">
              <div class="col-md-4">
                <label for="filterUser" class="form-label">Usuario / Correo</label>
                <input type="text" class="form-control" id="filterUser" placeholder="Buscar por nombre o correo...">
              </div>
              <div class="col-md-3">
                <label for="filterInstitution" class="form-label">Institución</label>
                <select id="filterInstitution" class="form-select">
                  <option value="">Todas</option>
                  <!-- Options filled dynamically -->
                </select>
              </div>
              <div class="col-md-3">
                <label for="filterStatus" class="form-label">Estado del Curso</label>
                <select id="filterStatus" class="form-select">
                  <option value="">Todos</option>
                  <option value="completed">Finalizados</option>
                  <option value="in_progress">En curso</option>
                </select>
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <button type="button" class="btn btn-secondary w-100" id="btnResetFilters">Limpiar</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Summary Widgets -->
        <div class="row mb-4">
          <div class="col-md-4">
            <div class="card text-white bg-primary shadow-sm h-100">
              <div class="card-body">
                <h6 class="card-title"><i class="bi bi-people-fill me-2"></i>Total Usuarios</h6>
                <h2 class="display-6" id="summaryTotalUsers">0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-white bg-success shadow-sm h-100">
              <div class="card-body">
                <h6 class="card-title"><i class="bi bi-check-circle-fill me-2"></i>Cursos Finalizados</h6>
                <h2 class="display-6" id="summaryCompletedCourses">0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-white bg-warning text-dark shadow-sm h-100">
              <div class="card-body">
                <h6 class="card-title"><i class="bi bi-play-circle-fill me-2"></i>Cursos en Progreso</h6>
                <h2 class="display-6" id="summaryInProgressCourses">0</h2>
              </div>
            </div>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle border">
            <thead class="table-dark">
              <tr>
                <th scope="col">Usuario</th>
                <th scope="col">Institución</th>
                <th scope="col">Curso</th>
                <th scope="col">Progreso</th>
                <th scope="col">Estado</th>
              </tr>
            </thead>
            <tbody id="reportsTableBody">
              <tr>
                <td colspan="5" class="text-center py-4">
                  <div class="spinner-border text-primary" role="status"></div>
                  <div class="mt-2">Cargando datos del reporte...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/reports.js"></script>
</body>

</html>
